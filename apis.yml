created: 2026-06-12
modified: 2026-06-12
specificationVersion: '0.19'
description: >
  Spendesk is an AI-powered spend management and procurement platform serving
  over 200,000 users across Europe. Its public REST API enables partners and
  customers to integrate programmatic card issuance, transaction retrieval,
  expense claims processing, vendor and invoice management, and accounting
  exports into their own tools and workflows. Authentication is supported via
  API keys (for customers) and OAuth2 (for partners building native
  integrations). API access requires a Premium or Enterprise subscription plan,
  and the developer portal at developer.spendesk.com provides reference
  documentation, changelogs, a Postman collection, and webhook administration.
tags:
  - Spend Management
  - Corporate Cards
  - Expense Management
  - Invoices
  - Procurement
  - FinTech
  - Accounting
  - Payments

apis:
  - name: Spendesk Public API
    description: >
      REST API for managing corporate cards, expense claims, vendor invoices,
      wallet summaries, settlements, bank fees, members, suppliers, cost
      centers, analytical fields, and webhook subscriptions within the Spendesk
      spend management platform.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.spendesk.com/
